{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Edit Department</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a href="{% url 'department_list' %}">Departments</a></li>
                        <li class="breadcrumb-item active">Edit Department</li>
                    </ul>
                </div>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Update Department Information</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label>Department Name <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control" value="{{ department.name }}" required>
                            </div>

                            <div class="form-group">
                                <label>Head of Department</label>
                                <select name="head_of_dept" class="form-control">
                                    <option value="">Select Department Head</option>
                                    {% for teacher in teachers %}
                                        <option value="{{ teacher.id }}" {% if department.head_of_dept.id == teacher.id %}selected{% endif %}>
                                            {{ teacher.user.first_name }} {{ teacher.user.last_name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="m-t-20 text-center">
                                <button type="submit" class="btn btn-primary">Update</button>
                                <a href="{% url 'department_list' %}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
