{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col">
          <h3 class="page-title">Subjects</h3>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead>
            <tr><th>Name</th><th>Department</th><th>Teacher</th></tr>
          </thead>
          <tbody>
            {% for s in subjects %}
            <tr>
              <td>{{ s.name }}</td>
              <td>{{ s.department.name }}</td>
              <td>{{ s.teacher }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No subjects</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
