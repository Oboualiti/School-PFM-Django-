{% extends 'Home/base.html' %}
{% block body %}

<div class="page-wrapper">
  <div class="content container-fluid">

    <div class="page-header">
      <h3>Add Grades - {{ exam.name }}</h3>
    </div>

    <div class="card">
      <div class="card-body">

        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="exam_id" value="{{ exam.id }}">

          <div class="form-group">
            <label>Student</label>
            <select name="student" class="form-control" required>
              <option value="" disabled selected>Select a student...</option>
              {% for s in students %}
              <option value="{{ s.id }}">{{ s }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label>Mark (max 20)</label>
            <input type="number" step="0.1" name="mark" class="form-control" min="0" max="20" required>
          </div>

          <button class="btn btn-success">Save Grade</button>
          <a href="{% url 'exam_list' %}" class="btn btn-secondary">Cancel</a>
        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
