{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col">
          <h3 class="page-title">Exams</h3>
        </div>
      </div>
    </div>
    {% if user.is_authenticated and user.is_teacher %}
    <div class="d-flex justify-content-end mb-2">
      <button id="toggle-create-exam" class="btn btn-primary">Add Exam</button>
    </div>
    <div id="create-exam-card" class="card mb-3" style="display:none;">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong>Create Exam</strong>
      </div>
      <div class="card-body">
        <form id="create-exam-form">
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>Title</label>
              <input type="text" class="form-control" name="title" required>
            </div>
            <div class="form-group col-md-6">
              <label>Subject</label>
              <select class="form-control" name="subject" required>
                {% for s in subjects %}
                  <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea class="form-control" name="description" rows="2"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>Start</label>
              <input type="datetime-local" class="form-control" name="start_datetime" required>
            </div>
            <div class="form-group col-md-6">
              <label>End</label>
              <input type="datetime-local" class="form-control" name="end_datetime" required>
            </div>
          </div>
          <div class="d-flex">
            <button type="submit" class="btn btn-primary">Create</button>
            <button type="button" id="cancel-create-exam" class="btn btn-outline-secondary ml-2">Cancel</button>
            <span id="create-exam-status" class="ml-2 text-muted"></span>
          </div>
        </form>
      </div>
    </div>
    <script>
      (function(){
        function getCookie(name){
          var value = '; ' + document.cookie;
          var parts = value.split('; ' + name + '=');
          if(parts.length === 2) return parts.pop().split(';').shift();
          return '';
        }
        function toISOLocal(input){
          // input is yyyy-MM-ddTHH:mm like from datetime-local
          if(!input) return '';
          // Treat as local and append 'Z' after converting to UTC if needed; for simplicity keep as local without TZ
          return input + 'Z';
        }
        var card = document.getElementById('create-exam-card');
        var toggleBtn = document.getElementById('toggle-create-exam');
        if(toggleBtn){
          toggleBtn.addEventListener('click', function(){
            card.style.display = (card.style.display === 'none' || card.style.display === '') ? 'block' : 'none';
          });
        }
        var form = document.getElementById('create-exam-form');
        if(form){
          form.addEventListener('submit', function(ev){
            ev.preventDefault();
            var fd = new FormData(form);
            var payload = {
              title: fd.get('title'),
              description: fd.get('description') || '',
              subject: fd.get('subject'),
              start_datetime: toISOLocal(fd.get('start_datetime')),
              end_datetime: toISOLocal(fd.get('end_datetime')),
              questions: []
            };
            var statusEl = document.getElementById('create-exam-status');
            statusEl.textContent = 'Submitting...';
            fetch('/academic/exams/create/', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
              },
              body: JSON.stringify(payload)
            }).then(function(r){
              return r.json().then(function(j){ return { status: r.status, body: j }; });
            }).then(function(res){
              if(res.status === 201){
                statusEl.textContent = 'Created exam #' + res.body.id;
                card.style.display = 'none';
                window.location.reload();
              } else {
                statusEl.textContent = (res.body && res.body.error) ? res.body.error : 'Error';
              }
            }).catch(function(e){
              statusEl.textContent = 'Network error';
            });
          });
          var cancelBtn = document.getElementById('cancel-create-exam');
          if(cancelBtn){
            cancelBtn.addEventListener('click', function(){
              form.reset();
              document.getElementById('create-exam-status').textContent = '';
              card.style.display = 'none';
            });
          }
        }
      })();
    </script>
    {% endif %}
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead>
            <tr><th>Name</th><th>Subject</th><th>Date</th></tr>
          </thead>
          <tbody>
            {% for e in exams %}
            <tr>
              <td>{{ e.name }}</td>
              <td>{{ e.subject.name }}</td>
              <td>{{ e.date }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No exams</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
