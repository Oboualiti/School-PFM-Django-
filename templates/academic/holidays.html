{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col">
          <h3 class="page-title">Holidays</h3>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <table class="table">
          <thead>
            <tr><th>Name</th><th>Date</th><th>Type</th></tr>
          </thead>
          <tbody>
            {% for h in holidays %}
            <tr>
              <td>{{ h.name }}</td>
              <td>{{ h.holiday_date }}</td>
              <td>{{ h.type }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No holidays</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
