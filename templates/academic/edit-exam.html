{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row align-items-center">
        <div class="col">
          <h3 class="page-title">Edit Exam</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Exams</a></li>
            <li class="breadcrumb-item active">Edit Exam</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label>Name</label>
            <input class="form-control" type="text" name="name" value="{{ exam.name }}" required>
          </div>
          <div class="form-group">
            <label>Subject</label>
            <select class="form-control" name="subject" required>
              {% for s in subjects %}
              <option value="{{ s.id }}" {% if s.id == exam.subject.id %}selected{% endif %}>{{ s.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Class</label>
            <select class="form-control" name="class_group" required>
              {% for c in classes %}
              <option value="{{ c.id }}" {% if c.id == exam.class_group.id %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input class="form-control" type="date" name="date" value="{{ exam.date|date:'Y-m-d' }}" required>
          </div>
          <div class="form-group">
            <label>Start Time</label>
            <input class="form-control" type="time" name="start_time" value="{{ exam.start_datetime|date:'H:i' }}" required>
          </div>
          <div class="form-group">
            <label>End Time</label>
            <input class="form-control" type="time" name="end_time" value="{{ exam.end_datetime|date:'H:i' }}" required>
          </div>
          <button class="btn btn-primary" type="submit">Update</button>
          <a href="{% url 'exam_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
